apiVersion: apps/v1
kind: Deployment

metadata:
  name: consumer-static
  namespace: event-autoscaling

spec:
  replicas: 2

  selector:
    matchLabels:
      app: consumer-static

  template:
    metadata:
      labels:
        app: consumer-static

    spec:
      containers:
      - name: consumer
        image: 337462094945.dkr.ecr.us-east-1.amazonaws.com/event-app:eks
        imagePullPolicy: IfNotPresent

        command:
          - python
          - consumer.py

        env:
          - name: PYTHONUNBUFFERED
            value: "1"

        envFrom:
          - configMapRef:
              name: event-app-config

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"